name: Expense Tracker CI/CD

on:
  push:
    branches: [ "main", "feature/**" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # JOB 1: Tests et Build
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'
      - run: npm ci
      - run: npm test

  # JOB 2: Vérification Dockerfile
  dockerfile-verify:
    runs-on: ubuntu-latest
    needs: test-and-build
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t expense-tracker:test -f Dockerfile .
      - name: Start Docker container
        run: docker run -d --rm -p 3000:3000 --name expense-test expense-tracker:test
      - name: Wait for application startup
        run: sleep 5
      - name: Verify application is responding
        run: curl -f http://localhost:3000/ || exit 1
      - name: Stop Docker container
        run: docker stop expense-test

  # JOB 3: Vérification Orchestration
  docker-compose-verify:
    runs-on: ubuntu-latest
    needs: [test-and-build, dockerfile-verify]
    env:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${{ secrets.DB_NAME }}
      DB_USER: ${{ secrets.DB_USER }}
      DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
      NODE_ENV: production
    steps:
      - uses: actions/checkout@v4
      
      - name: 🔍 Verify GitHub Secrets
        run: |
          if [ -z "${{ secrets.DB_PASSWORD }}" ] || [ -z "${{ secrets.DB_USER }}" ] || [ -z "${{ secrets.DB_NAME }}" ]; then
            echo "❌ ERROR: Missing secrets!"
            exit 1
          fi
          echo "✅ Secrets OK"

      - name: Start services with docker compose
        run: docker compose up -d
      
      - name: Wait for services
        run: sleep 10
      
      - name: Verify web application
        run: curl -f http://localhost:3000/ || exit 1
      
      - name: Stop all services
        run: docker compose down